# Disposable Postgres for local / CI verification (port 5434 — avoids dev 5432).
# Usage (from repo root):
#   docker compose -p ff_test_env -f backend/docker-compose.test-env.yml up -d
#   set DATABASE_URL=postgresql://postgres:ff_test_env_pw@127.0.0.1:5434/focusflow_test?schema=public
#   cd backend && npx prisma migrate deploy
# Teardown:
#   docker compose -p ff_test_env -f backend/docker-compose.test-env.yml down -v

services:
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ff_test_env_pw
      POSTGRES_DB: focusflow_test
    ports:
      - '5434:5432'
    volumes:
      - ff_pg_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d focusflow_test']
      interval: 3s
      timeout: 3s
      retries: 15

volumes:
  ff_pg_test_data:
